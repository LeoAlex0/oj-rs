name: "OJ packer"

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test packer and generated submissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check packer formatting
        run: cargo fmt -p oj-pack --check

      - name: Lint packer
        run: cargo clippy -p oj-pack --all-targets -- -D warnings

      - name: Test packer
        run: cargo test -p oj-pack --all-targets

      - name: Smoke-test packed submissions
        run: |
          set -euo pipefail
          for bin in $(cargo oj-pack --list 2>&1); do
            out="/tmp/${bin}.rs"
            cargo oj-pack "$bin" > "$out"
            test -s "$out"
            wc -l -c "$out"
          done
