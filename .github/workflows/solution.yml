name: "Solution"

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format, lint, and test solution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check solution formatting
        run: cargo fmt -p solution --check

      - name: Lint solution
        run: cargo clippy -p solution --all-targets -- -D warnings

      - name: Check solution binaries
        run: cargo check -p solution --bins

      - name: Test solution
        run: cargo test -p solution --all-targets

  benchmark:
    name: Run criterion benchmarks
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          set -euo pipefail
          mkdir -p target/criterion
          {
            echo "## finger_tree"
            cargo bench -p solution --bench finger_tree -- --sample-size 10 --warm-up-time 1 --measurement-time 1
            echo "## seg_tree"
            cargo bench -p solution --bench seg_tree -- --sample-size 10 --warm-up-time 1 --measurement-time 1
          } 2>&1 | tee target/criterion/ci-bench-output.txt

      - name: Upload criterion report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-report
          path: target/criterion
